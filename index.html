<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tracker-container">
        <h2>Personal Finance Tracker</h2>
        
        <div class="balance-card">
            <h3>Your Balance</h3>
            <h1 id="balance">$0.00</h1>
        </div>

        <div class="summary-container">
            <div class="summary-box income">
                <h4>Income</h4>
                <p id="money-plus">+$0.00</p>
            </div>
            <div class="summary-box expense">
                <h4>Expense</h4>
                <p id="money-minus">-$0.00</p>
            </div>
        </div>

        <h3>History</h3>
        <ul id="list" class="list">
            </ul>

        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g., Salary, Groceries, Rent" required />
            </div>
            <div class="form-control">
                <label for="amount">Amount <br> <small>(positive = income, negative = expense)</small></label>
                <input type="number" step="0.01" id="amount" placeholder="e.g., 500 or -45" required />
            </div>
            <button class="btn">Add Transaction</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
